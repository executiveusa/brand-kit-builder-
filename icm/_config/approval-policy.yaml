version: 1.0.0
owner_authority_default: Bambu
principles:
  agent_self_approval: prohibited
  approval_must_bind_to_evidence_version: true
  approvals_are_scope_specific: true
  stale_after_material_change: true
  transport_status_is_not_approval: true
human_approval_required_for:
  - release
  - production_deploy_when_policy_requires
  - irreversible_action
  - rights_or_license_exception
  - destructive_logo_or_identity_change
  - cost_guard_override
  - blast_radius_override
  - unresolved_high_impact_evidence_conflict
agent_transports:
  cli_noninteractive: approval_write_prohibited
  mcp: approval_write_prohibited
  sdk: approval_write_prohibited
  http_api: approval_write_prohibited
  paperclip: approval_write_prohibited_until_human_auth_adapter_exists
approval_record_required_fields:
  - action
  - scope
  - approved_by
  - approved_at
  - evidence_hash_or_version
  - channel_or_method
  - status
revocation_supported: true
