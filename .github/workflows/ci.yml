name: Agent Core CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run check
      - name: Run tests
        id: tests
        shell: bash
        run: |
          set +e
          npm test > test-output.log 2>&1
          status=$?
          tail -n 80 test-output.log
          exit "$status"
      - name: Upload test diagnostics
        if: failure() && steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-output.log
          if-no-files-found: error
          retention-days: 1
